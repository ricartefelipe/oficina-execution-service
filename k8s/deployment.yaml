apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-execution-service
  namespace: oficina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oficina-execution-service
  template:
    metadata:
      labels:
        app: oficina-execution-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/actuator/prometheus
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: oficina-execution-service
          image: ghcr.io/ricartefelipe/oficina-execution-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: oficina-execution-config
            - secretRef:
                name: oficina-execution-secrets
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oficina-execution-service
  namespace: oficina
spec:
  selector:
    app: oficina-execution-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oficina-execution-config
  namespace: oficina
data:
  MONGO_URI: "mongodb://mongodb:27017/oficina_execution"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/oficina"
